<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Swipcall</title>
    <meta name="robots" content="noindex">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#1C1C1E">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.css">
    <link rel="stylesheet" href="/css/cookieconsent-dark.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#1C1C1E;color:#D4D4D8;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
        .wrap{max-width:440px}
        h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:72px;font-weight:700;color:#FF6B35;margin-bottom:8px}
        p{font-size:17px;color:#A3A3A9;margin-bottom:32px;line-height:1.6}
        a{display:inline-block;color:#FF6B35;font-weight:700;text-decoration:none;font-size:15px;padding:12px 28px;border:1px solid rgba(255,107,53,0.3);border-radius:8px;transition:all .2s}
        a:hover{background:rgba(255,107,53,0.1);border-color:#FF6B35}
    </style>
</head>
<body>
    <div class="wrap">
        <h1>404</h1>
        <p>This page doesn't exist. Maybe the URL is wrong, or the page was moved.</p>
        <a href="/">Back to Swipcall</a>
    </div>
    <script src="/js/a11y.js" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js" defer></script>
    <script src="/js/cookieconsent-config.js" defer></script>
</body>
</html>
